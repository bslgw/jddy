name: Build OpenWrt Package

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: '请粘贴从官网复制的 .tar.xz 完整链接 (必须匹配你的内核)'
        required: true
      package_repo:
        description: 'Package source git URL'
        required: true
        default: 'https://github.com/sbwml/package_kernel_tcp-brutal'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3 rsync unzip zlib1g-dev file wget subversion

      - name: Setup SDK
        run: |
          # 验证 URL 是否提供
          if [ -z "${{ github.event.inputs.sdk_url }}" ]; then echo "Error: SDK URL is empty" && exit 1; fi
          wget "${{ github.event.inputs.sdk_url }}" -O sdk.tar.xz
          tar -xJf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Fetch Package Source
        run: |
          git clone ${{ github.event.inputs.package_repo }} sdk/package/tcp-brutal

      - name: Compile
        run: |
          cd sdk
          make defconfig
          make package/tcp-brutal/compile V=s

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: compiled-package
          path: sdk/bin/packages/*/*/tcp-brutal*.ipk
