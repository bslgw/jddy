name: Build-iStoreOS-Brutal

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparation environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget libelf-dev zstd

      - name: Download OpenWrt Official 24.10.6 SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          echo "正在下载官方 24.10.6 编译环境..."
          wget -q --tries=5 "$SDK_URL" -O openwrt-sdk.tar.zst
          tar -I zstd -xf openwrt-sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: Update and Install Feeds
        run: |
          cd sdk
          # 引入 tcp-brutal 官方 feed 源
          echo "src-git brutal_feed https://github.com/haruue-net/openwrt-tcp-brutal.git" >> feeds.conf.default
          
          # 替换核心镜像源，避免下载死锁
          sed -i 's/git.openwrt.org\/feed\/packages.git/github.com\/openwrt\/packages.git/g' feeds.conf.default
          sed -i 's/git.openwrt.org\/project\/luci.git/github.com\/openwrt\/luci.git/g' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject Configuration
        run: |
          cd sdk
          # 强行把导致全局配置闪退的几个不相干的坏包从系统依赖里删掉
          sed -i '/kmod-phy-bcm-ns-usb/d' package/kernel/linux/Makefile
          sed -i '/onionshare-cli/d' feeds/packages/net/onionshare-cli/Makefile || true
          
          # 写入目标组件激活开关
          echo "CONFIG_PACKAGE_kmod-tcp-brutal=m" >> .config
          
          # 让官方正规配置器跑完全程以锁定依赖
          make defconfig

      - name: Compile Target Package
        run: |
          cd sdk
          # 顺着通过验证的 feeds 路径全速点火编译
          make package/feeds/brutal_feed/tcp-brutal/compile V=s -j$(nproc)

      - name: Collect Output Files (💡 路径修正：精准对接最终产物库)
        run: |
          mkdir -p ../output_artifacts
          
          echo "=== 正在前往 bin 目录打捞生成的官方标准安装包 ==="
          # 💡 根据成功日志，直接去目标的 bin/targets 目录下精准提取打出来的完整安装包
          find sdk/bin/targets/ -name "*brutal*.ipk" -exec cp {} ../output_artifacts/ \; || true
          
          echo "=== 最终打包区产物审查 ==="
          ls -la ../output_artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-tcp-brutal-24.10.6
          path: output_artifacts/*
          if-no-files-found: error
