name: build-tcp-brutal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo docker image prune -af

    - name: Install Dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          build-essential \
          clang \
          flex \
          bison \
          g++ \
          gawk \
          gcc-multilib \
          gettext \
          git \
          libncurses5-dev \
          libssl-dev \
          python3 \
          rsync \
          unzip \
          zlib1g-dev \
          file \
          wget \
          tar \
          zstd

    - name: Download OpenWrt SDK
      run: |

        wget https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst

        tar --zstd -xf openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst

        SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")

        mv "$SDK_DIR" openwrt

    - name: Clone tcp brutal package
      run: |

        cd openwrt

        git clone \
          https://github.com/sbwml/package_kernel_tcp-brutal \
          package/kernel/tcp-brutal

    - name: Update Feeds
      run: |

        cd openwrt

        ./scripts/feeds update -a

        ./scripts/feeds install -a

    - name: Configure
      run: |

        cd openwrt

        cat >> .config << EOF
        CONFIG_PACKAGE_kmod-tcp-brutal=m
        EOF

        make defconfig

    - name: Compile tcp brutal
      run: |

        cd openwrt

        make package/kernel/tcp-brutal/compile V=s

    - name: Show Output
      run: |

        find openwrt/bin/ -name "*.ipk"

    - name: Upload ipk
      uses: actions/upload-artifact@v4
      with:
        name: tcp-brutal-ipk

        path: |
          openwrt/bin/packages/**/*.ipk
