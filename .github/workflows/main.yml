name: Build OpenWrt Package

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: 'OpenWrt SDK URL (必须从官网获取并填入此处)'
        required: true
        # 请务必替换下面的链接为你当前固件版本对应的 SDK 下载地址
        default: 'https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-14.2.0_musl.Linux-x86_64.tar.xz'
      package_repo:
        description: 'Package source git URL'
        required: true
        default: 'https://github.com/sbwml/package_kernel_tcp-brutal'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3 rsync unzip zlib1g-dev file wget subversion

      - name: Setup SDK
        run: |
          wget ${{ github.event.inputs.sdk_url }} -O sdk.tar.xz
          tar -xJf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Fetch Package Source
        run: |
          git clone ${{ github.event.inputs.package_repo }} sdk/package/tcp-brutal

      - name: Compile
        run: |
          cd sdk
          make defconfig
          make package/tcp-brutal/compile V=s

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: compiled-package
          path: sdk/bin/packages/*/*/tcp-brutal*.ipk
