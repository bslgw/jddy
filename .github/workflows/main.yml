name: Build TCP-Brutal
on: [workflow_dispatch] # 手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout OpenWrt Official
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: v23.05.5 # 确保版本与你固件的内核版本匹配

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3-distutils

      - name: Inject TCP-Brutal Source
        run: |
          # 将 Hysteria 官方仓库的代码克隆到 package 目录，作为内置模块编译
          git clone https://github.com/apernet/tcp-brutal package/tcp-brutal

      - name: Configure and Build
        run: |
          # 1. 初始化配置文件
          make defconfig
          
          # 2. 启用 TCP-Brutal (模块化编译)
          # 注意：Brutal 是内核模块，必须选择为 'm'
          echo "CONFIG_PACKAGE_kmod-tcp-brutal=m" >> .config
          make defconfig
          
          # 3. 编译
          # 仅编译该模块及其必须的内核依赖，避免全量编译
          make package/tcp-brutal/compile V=s -j$(nproc)

      - name: Collect IPK
        run: |
          # 查找生成的 ipk 文件
          find bin/packages -name "*.ipk"
